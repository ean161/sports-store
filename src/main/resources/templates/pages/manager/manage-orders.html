<script>
    // Simple client filter
    const q = document.getElementById('orderSearch');
    const sel = document.getElementById('statusSelect');
    const body = document.getElementById('ordersBody');
    function apply(){
        const term = q.value.toLowerCase();
        const st = sel.value.toLowerCase();
        for(const tr of body.querySelectorAll('tr')){
            const text = tr.innerText.toLowerCase();
            const badge = tr.querySelector('.badge')?.textContent.toLowerCase() || '';
            const ok = (!term || text.includes(term)) && (!st || badge.includes(st));
            tr.style.display = ok ? '' : 'none';
        }
    }
    q.addEventListener('input', apply); sel.addEventListener('change', apply);
</script>
